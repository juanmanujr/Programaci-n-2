{% extends 'base.html' %}
{% load static %}

{% block title %}{{ titulo_pagina }} - {{ block.super }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        
        <h2 class="mt-4 mb-4">{{ titulo_pagina }}</h2>

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                {% if object %}
                <i class="fas fa-edit"></i> Edición de Producto
                {% else %}
                <i class="fas fa-plus-circle"></i> Registro de Nuevo Producto
                {% endif %}
            </div>
            
            <div class="card-body">
                
                <form method="post">
                    {% csrf_token %}
                    
                    {{ form.as_p }}

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-success mr-2">
                            <i class="fas fa-save"></i> Guardar
                        </button>
                        <a href="{% url 'producto_lista' %}" class="btn btn-secondary">
                            <i class="fas fa-times-circle"></i> Cancelar
                        </a>
                    </div>
                </form>

            </div>
        </div>
        
    </div>
</div>
{% endblock %}
